name: Sync HTML reports

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v4

      - name: Clone source repo
        run: |
          git clone https://x-access-token:${{ secrets.SOURCE_REPO_TOKEN }}@github.com/ricardosouzag/gradeanalysis.git temp_source

      - name: Copy HTML files
        run: |
          mkdir -p relatorios
          rsync -av --delete "temp_source/2026/relatorios-simples/" "relatorios/"
          rm -rf temp_source

      - name: Generate per-school indexes
        shell: bash
        run: |
          shopt -s nullglob

          for school_dir in relatorios/*/; do
            school=$(basename "$school_dir")
            school_display="${school//-/ }"
            school_display="${school_display//_/ }"

            cat > "$school_dir/index.html" <<EOF
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios - $school_display</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f7fa;
      padding: 2rem;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin-bottom: 0.75rem;
    }

    a {
      display: block;
      padding: 1rem;
      text-decoration: none;
      background: #f8fafc;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      color: #0f172a;
    }

    a:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Relatórios — $school_display</h1>
    <ul>
EOF

            for file in "$school_dir"/*.html; do
              fname=$(basename "$file")

              if [ "$fname" != "index.html" ]; then
                display_name="${fname%.html}"
                display_name="${display_name//_/ }"

                echo "<li><a href=\"$fname\">$display_name</a></li>" >> "$school_dir/index.html"
              fi
            done

            cat >> "$school_dir/index.html" <<EOF
    </ul>
  </div>
</body>
</html>
EOF

          done

          rm -f relatorios/index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync reports"
          git push