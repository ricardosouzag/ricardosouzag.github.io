name: Sync HTML reports

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v4

      - name: Clone source repo
        run: |
          git clone https://x-access-token:${{ secrets.SOURCE_REPO_TOKEN }}@github.com/ricardosouzag/gradeanalysis.git temp_source

      - name: Copy HTML files
        run: |
          mkdir -p relatorios
          rsync -av --delete "temp_source/2026/relatorios-simples/" "relatorios/"
          rm -rf temp_source

      - name: Generate per-school indexes
        run: |
          python <<'PYTHON'
          from pathlib import Path
          from datetime import datetime

          relatorios = Path("relatorios")

          def make_collapsible(html: str) -> str:
              """
              Wrap sections starting with <h1>, <h2>, <h3> into <details>.
              First section open, others closed.
              """
              import re

              sections = re.split(r'(<h[1-3][^>]*>.*?</h[1-3]>)', html, flags=re.DOTALL)

              result = []
              open_first = True

              i = 0
              while i < len(sections):
                  if sections[i].startswith("<h"):
                      title = sections[i]
                      content = sections[i + 1] if i + 1 < len(sections) else ""

                      if open_first:
                          result.append(f"<details open><summary>{title}</summary>{content}</details>")
                          open_first = False
                      else:
                          result.append(f"<details><summary>{title}</summary>{content}</details>")

                      i += 2
                  else:
                      result.append(sections[i])
                      i += 1

              return "".join(result)


          TEMPLATE = """
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>{title}</title>
            <style>
              body {{
                font-family: system-ui, sans-serif;
                background: #f5f7fa;
                padding: 2rem;
                color: #222;
              }}

              .container {{
                max-width: 1100px;
                margin: auto;
                background: white;
                padding: 2rem;
                border-radius: 16px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.08);
              }}

              details {{
                margin-bottom: 1rem;
                border: 1px solid #e2e8f0;
                border-radius: 12px;
                overflow: hidden;
              }}

              summary {{
                cursor: pointer;
                padding: 1rem;
                font-size: 1.2rem;
                background: #f1f5f9;
                border-bottom: 1px solid #e2e8f0;
              }}

              details[open] summary {{
                background: #e2e8f0;
              }}

              details > *:not(summary) {{
                padding: 1rem;
              }}

              table {{
                width: 100%;
                border-collapse: collapse;
              }}

              th, td {{
                border: 1px solid #e5e7eb;
                padding: 0.5rem;
                text-align: left;
              }}

              th {{
                background: #f8fafc;
              }}

              .footer {{
                margin-top: 2rem;
                font-size: 0.9rem;
                color: #777;
              }}
            </style>
          </head>
          <body>
            <div class="container">
              {content}
              <div class="footer">
                Última atualização: {timestamp}
              </div>
            </div>
          </body>
          </html>
          """

          timestamp = datetime.now().strftime("%d/%m/%Y às %H:%M")

          for school_dir in relatorios.iterdir():
              if not school_dir.is_dir():
                  continue

              for html_file in school_dir.glob("*.html"):
                  if html_file.name == "index.html":
                      continue

                  original = html_file.read_text(encoding="utf-8")

                  # Extract body content only (if full HTML exists)
                  import re
                  body_match = re.search(r"<body.*?>(.*?)</body>", original, re.DOTALL)
                  content = body_match.group(1) if body_match else original

                  content = make_collapsible(content)

                  new_html = TEMPLATE.format(
                      title=html_file.stem,
                      content=content,
                      timestamp=timestamp
                  )

                  html_file.write_text(new_html, encoding="utf-8")

          # remove root index if exists
          root_index = relatorios / "index.html"
          if root_index.exists():
              root_index.unlink()

          PYTHON

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync reports"
          git push