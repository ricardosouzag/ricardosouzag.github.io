name: Sync HTML reports

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # every hour (optional)

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v4

      - name: Clone source repo
        run: |
          git clone https://github.com/ricardosouzag/gradeanalysis.git source

      - name: Copy HTML files
        run: |
          mkdir -p relatorios
          rsync -av --delete "source/2026/relatorios-simples/" relatorios/

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync reports"
          git push