name: Sync HTML reports

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v4

      - name: Clone source repo
        run: |
          git clone https://x-access-token:${{ secrets.SOURCE_REPO_TOKEN }}@github.com/ricardosouzag/gradeanalysis.git temp_source

      - name: Copy HTML files
        run: |
          mkdir -p relatorios
          rsync -av --delete "temp_source/2026/relatorios-simples/" "relatorios/"
          rm -rf temp_source

      - name: Generate per-school indexes
        run: |
          python <<'PYTHON'
          from pathlib import Path
          from datetime import datetime

          relatorios = Path("relatorios")

          TEMPLATE = """
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Relatórios - {school}</title>
            <style>
              body {{
                font-family: system-ui, sans-serif;
                background: #f5f7fa;
                padding: 2rem;
                color: #222;
              }}

              .container {{
                max-width: 900px;
                margin: auto;
                background: white;
                padding: 2rem;
                border-radius: 16px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.08);
              }}

              ul {{
                list-style: none;
                padding: 0;
              }}

              li {{
                margin-bottom: 0.75rem;
              }}

              a {{
                display: block;
                padding: 1rem;
                text-decoration: none;
                background: #f8fafc;
                border-radius: 10px;
                border: 1px solid #e2e8f0;
                color: #0f172a;
              }}

              a:hover {{
                background: #e2e8f0;
              }}

              .footer {{
                margin-top: 2rem;
                font-size: 0.9rem;
                color: #777;
              }}
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Relatórios — {school}</h1>
              <ul>
                {links}
              </ul>
              <div class="footer">
                Última atualização: {timestamp}
              </div>
            </div>
          </body>
          </html>
          """

          timestamp = datetime.now().strftime("%d/%m/%Y às %H:%M")

          for school_dir in relatorios.iterdir():
              if not school_dir.is_dir():
                  continue

              school_display = school_dir.name.replace("-", " ").replace("_", " ")

              links = []
              for html_file in sorted(school_dir.glob("*.html")):
                  if html_file.name == "index.html":
                      continue

                  display_name = html_file.stem.replace("_", " ")
                  links.append(
                      f'<li><a href="{html_file.name}">{display_name}</a></li>'
                  )

              index_html = TEMPLATE.format(
                  school=school_display,
                  links="\n      ".join(links),
                  timestamp=timestamp,
              )

              (school_dir / "index.html").write_text(index_html, encoding="utf-8")

          root_index = relatorios / "index.html"
          if root_index.exists():
              root_index.unlink()
          PYTHON

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Sync reports"
          git push